server:
  port: 8080

spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/aimarketplace_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:

    hibernate:
      ddl-auto: update

    show-sql: true

    properties:

      hibernate:

        format_sql: true

        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:

    redis:

      host: localhost

      port: 6379

  ai:

    ollama:

      base-url: http://localhost:11434

      chat:
        options:

          model: llama3.2

logging:

  level:

    org.springframework.security: DEBUG

    org.hibernate.SQL: DEBUG

springdoc:

  swagger-ui:

    path: /swagger-ui.html

  api-docs:

    path: /api-docs

jwt:

  secret: iuecrjt4989g5m47chmc93x9u948034ut85utcg0jbpowoidmhubw75tr4h589mvh8m4

  expiration: 86400000