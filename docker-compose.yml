version: '3.9'

services:

  postgres:

    image: postgres:17

    container_name: ai-marketplace-postgres

    restart: always

    environment:
      POSTGRES_DB: aimarketplace_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7.4

    container_name: ai-marketplace-redis

    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  ollama:

    image: ollama/ollama:latest

    container_name: ai-marketplace-ollama

    restart: always

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

volumes:

  postgres_data:

  redis_data:

  ollama_data: